<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

body{
  background:#f8f4f9;
  color:#3d2b4e;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  min-height:100vh;
  padding-bottom:100px;
  padding-top:env(safe-area-inset-top,24px)
}
button,select{font-family:inherit;cursor:pointer}
select{-webkit-appearance:none;appearance:none}

/* ── HEADER ─────────────────────────────── */
.hdr{
  background:#fff;
  border-bottom:1px solid #f0e6f6;
  padding:28px 16px 16px;
  box-shadow:0 2px 16px rgba(200,160,220,.1)
}
.hdr-top{display:flex;align-items:center;justify-content:space-between;gap:10px}
.ttl{
  font-family:Impact,sans-serif;
  font-size:clamp(2rem,8vw,3rem);
  letter-spacing:3px;
  line-height:.95;
  color:#2d1b3e
}
.ttl span{color:#e91e8c}


/* ── DEADLINE ───────────────────────────── */
.dlbar{
  margin-top:12px;
  background:linear-gradient(135deg,#fff0f7,#f9f0ff);
  border:1px solid #f5d0e8;
  border-radius:14px;
  padding:10px 14px;
  display:flex;align-items:center;justify-content:space-between
}
.dll{font-size:9px;color:#c090b0;font-weight:800;letter-spacing:1.5px;text-transform:uppercase}
.dld{font-size:13px;color:#c04080;font-weight:700;margin-top:2px}
.dlc{font-family:Impact,sans-serif;font-size:1.8rem;line-height:1}
.dls{font-size:9px;color:#c090b0;font-weight:600}

/* ── MODE TOGGLE ────────────────────────── */
.mtog{display:flex;gap:8px;padding:12px 14px 6px}
.mbtn{
  flex:1;padding:10px 12px;border-radius:12px;
  border:1.5px solid #edd8f5;
  background:#fff;
  color:#b080c8;
  font-size:11px;font-weight:800;letter-spacing:.5px;
  display:flex;align-items:center;justify-content:center;gap:5px
}

/* ── DAYS ───────────────────────────────── */
.days{display:flex;flex-direction:column;gap:10px;padding:4px 14px 20px}

.dc{
  background:#fff;
  border-radius:18px;
  overflow:hidden;
  border:1.5px solid #f0e4f8;
  box-shadow:0 3px 16px rgba(180,120,210,.07)
}
.dh{
  display:flex;align-items:center;gap:12px;
  padding:14px;cursor:pointer;
  user-select:none;-webkit-user-select:none
}
.dbox{
  width:48px;height:48px;border-radius:14px;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  flex-shrink:0;position:relative
}
.dlbl{font-family:Impact,sans-serif;font-size:.85rem;letter-spacing:1px;line-height:1.1;text-align:center}
.tdot{position:absolute;top:-3px;right:-3px;width:10px;height:10px;border-radius:50%;border:2px solid #fff}
.di{flex:1}
.dn{font-family:Impact,sans-serif;font-size:1.05rem;letter-spacing:1.5px;line-height:1;color:#2d1b3e}
.ds{font-size:11px;color:#c0a8d0;margin-top:3px;font-weight:500}
.dpb{margin-top:7px;height:3px;background:#f0e4f8;border-radius:2px;overflow:hidden}
.dpf{height:100%;border-radius:2px}
.dchev{font-size:20px;color:#d0b8e4;transition:transform .2s;flex-shrink:0}
.dcnt{font-size:10px;font-weight:700;color:#c0a8d0}
.dbody{border-top:1px solid #f5edfb}

/* ── SUPERSET ───────────────────────────── */
.ssblk{border-radius:14px;overflow:hidden;margin:8px 0}
.sshdr{padding:8px 12px;display:flex;align-items:center}
.sslbl{font-size:11px;font-weight:800;letter-spacing:.8px}
.ssbetween{padding:2px 12px 2px 80px;display:flex;align-items:center}
.ssarr{font-size:9.5px;font-weight:700}
.ssftr{padding:6px 12px 9px 28px}
.ssftr span{font-size:10.5px;font-weight:700}
.sswrap{position:relative;padding-left:10px}
.ssnum{position:absolute;left:2px;top:16px;width:16px;height:16px;border-radius:50%;color:#fff;font-size:10px;font-weight:900;display:flex;align-items:center;justify-content:center;z-index:2}

/* ── EXERCISE ROWS ──────────────────────── */
.exrow{border-bottom:1px solid #faf4fd}
.extap{
  display:flex;align-items:flex-start;gap:10px;
  padding:12px 14px 9px;
  cursor:pointer;user-select:none;-webkit-user-select:none
}
.exicon{
  width:62px;height:62px;flex-shrink:0;
  border-radius:14px;border:1.5px solid #efe0f8;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;background:#fdf8ff
}
.excnt{flex:1;min-width:0}
.exnm{font-size:13px;font-weight:700;color:#2d1b3e;line-height:1.2}
.exst{font-size:12px;color:#c0a8d0;margin-top:3px}
.exst strong{color:#7a4a9e;font-weight:700}
.extip{font-size:10.5px;color:#cdb8de;margin-top:3px;line-height:1.45}
.exbadges{display:flex;gap:5px;flex-wrap:wrap;margin-top:5px}
.bdg{
  font-size:9.5px;font-weight:800;letter-spacing:.6px;
  text-transform:uppercase;padding:2px 8px;
  border-radius:20px;border:1px solid
}
.ba{color:#5888e8;border-color:rgba(88,136,232,.3);background:rgba(88,136,232,.07)}

// ── HELPERS ────────────────────────────────────────────────────────────────
function getParisNow(){
  var ds=new Date().toLocaleDateString('en-CA',{timeZone:'Europe/Paris'});
  return new Date(ds+'T12:00:00');
}
function getISO(){var d=getParisNow(),f=new Date(d.getFullYear(),0,1),x=Math.floor((d-f)/86400000);return Math.ceil((x+f.getDay()+1)/7);}
function getWK(){var d=getParisNow();return d.getFullYear()+'-W'+getISO();}
function getTI(){
  var dow=getParisNow().getDay();
  dow=dow===0?6:dow-1;
  // Lun→J1, Mar→J2, Jeu→J3, Ven→J4, Sam→J5 ; Mer/Dim → prochain
  var map={0:0,1:1,3:2,4:3,5:4};
  if(map[dow]!==undefined){return map[dow];}
  if(dow===2){return 2;} // Mer → montre J3 (Jeudi)
  return 0; // Dim → montre J1 (Lundi)
}
function getReps(ex){
  if(ex.reps)return ex.reps;
  if(ex.cat==='cardio'||ex.cat==='warmup')return'5 min';
  return'3 × 12 reps';
}
function buildBlocks(exs){
  var blocks=[],cur=null;
  for(var i=0;i<exs.length;i++){
    var ex=exs[i];
    if(ex.isAbs||ex.cat==='cardio'||ex.cat==='warmup'||ex.isIso||!ex.pair){
      if(cur){blocks.push(cur);cur=null;}
      blocks.push({type:'solo',exercises:[ex]});
      continue;
    }
    if(cur&&cur.pair===ex.pair&&cur.exercises.length<2){cur.exercises.push(ex);}
    else{if(cur)blocks.push(cur);cur={type:'group',cat:ex.cat,pair:ex.pair,exercises:[ex]};}
  }
  if(cur)blocks.push(cur);
  return blocks.map(function(b){return b.exercises.length===1?{type:'solo',cat:b.cat,exercises:b.exercises}:b;});
}
function exCol(ex,dc){
  if(ex.cat==='cardio')return'#2ecc71';
  if(ex.cat==='warmup')return'#f59e0b';
  return dc;
}
function ld(k,d){try{var v=localStorage.getItem(k);return v===null?d:JSON.parse(v);}catch(e){return d;}}
function sv(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}

// ── STATE ──────────────────────────────────────────────────────────────────
var TI=getTI();
var DL='2026-06-11';
var JLEFT=Math.max(0,Math.floor((new Date(DL)-getParisNow())/86400000));
var WK=getWK();
var S={
  mode:'today',
  openDays:{},
  weights:ld('myr_w',{}),
  hist:ld('myr_h',{}),
  done:ld('myr_k',null)===WK?ld('myr_d',{}):{},
};
S.openDays[TI]=true;
if(ld('myr_k',null)!==WK){sv('myr_k',WK);}

// ── RENDER ─────────────────────────────────────────────────────────────────
function render(){
  var el=document.getElementById('app');
  if(!el)return;
  el.innerHTML=buildHTML();
  bindEvents();
}

function bindEvents(){
  // Mode buttons
  var btnToday=document.getElementById('btn-today');
  var btnWeek=document.getElementById('btn-week');
  if(btnToday)btnToday.addEventListener('click',function(){S.mode='today';S.openDays={};S.openDays[TI]=true;render();});
  if(btnWeek)btnWeek.addEventListener('click',function(){S.mode='week';S.openDays={};render();});
  // Day headers
  var dhs=document.querySelectorAll('.dh');
  dhs.forEach(function(dh){
    dh.addEventListener('click',function(){
      var i=parseInt(this.getAttribute('data-i'));
      if(S.openDays[i])delete S.openDays[i];else S.openDays[i]=true;
      render();
    });
  });
  // Exercise taps
  var taps=document.querySelectorAll('.extap');
  taps.forEach(function(tap){
    tap.addEventListener('click',function(){
      var id=this.getAttribute('data-id');
      S.done[id]=!S.done[id];
      sv('myr_d',S.done);
      render();
    });
  });
  // Weight selects
  var sels=document.querySelectorAll('.wsel');
  sels.forEach(function(sel){
    sel.addEventListener('change',function(e){
      e.stopPropagation();
      var id=this.getAttribute('data-id');
      var val=this.value;
      S.weights[id]=val;
      sv('myr_w',S.weights);
      var hist=S.hist[id]||[];
      var last=hist.length>0?hist[hist.length-1]:null;
      if(last&&last.weight===val){hist[hist.length-1].completedCount=(last.completedCount||1)+1;}
      else{hist.push({weight:val,completedCount:1});if(hist.length>20)hist.shift();}
      S.hist[id]=hist;
      sv('myr_h',S.hist);
      render();
    });
    sel.addEventListener('click',function(e){e.stopPropagation();});
  });
}

function buildHTML(){
  var td=P[TI];
  var daysHTML=S.mode==='today'
    ?dayHTML(P[TI],TI,true)
    :P.map(function(d,i){return dayHTML(d,i,false);}).join('');
  return '<div class="hdr">'
    +'<div class="hdr-top">'
    +'<div class="ttl">MYRIAM <span style="color:#e91e8c">&#9792;</span></div>'
    +'</div>'
    +'<div class="dlbar">'
    +'<div><div class="dll">&#128197; R\u00c9VISION DU PROGRAMME</div><div class="dld">11 Juin 2026</div></div>'
    +'<div style="text-align:right">'+( JLEFT===0 ? '<div class="dlc" style="color:#e91e8c;font-size:1rem;line-height:1.1">&#10060; CHANGER</div><div class="dls" style="color:#e91e8c;font-weight:700">LE PROGRAMME</div>' : '<div class="dlc" style="color:'+(JLEFT<14?'#e91e8c':'#a855f7')+'">J\u2013'+JLEFT+'</div><div class="dls">jours restants</div>')+'</div>'
    +'</div></div>'
    +'<div class="mtog">'
    +'<button class="mbtn" id="btn-today" style="'+(S.mode==='today'?'background:'+td.color+'18;border-color:'+td.color+';color:'+td.color:'')+'">&#128205; AUJOURD\u2019HUI</button>'
    +'<button class="mbtn" id="btn-week" style="'+(S.mode==='week'?'background:rgba(233,30,140,.15);border-color:#e91e8c;color:#e91e8c':'')+'">&#128198; SEMAINE</button>'
    +'</div>'
    +'<div class="days">'+daysHTML+'</div>'
}

function dayHTML(day,idx,forceOpen){
  var open=forceOpen||!!S.openDays[idx];
  var isToday=idx===TI;
  var dc=0,tot=0;
  for(var i=0;i<day.exercises.length;i++){var ex2=day.exercises[i];if(ex2.cat==='warmup'||ex2.isAbs||ex2.cat==='cardio')continue;tot++;if(S.done[ex2.id])dc++;}
  var pct=Math.round(dc/tot*100);
  var fc=pct===100?'#2ecc71':day.color;
  return '<div class="dc" style="border-color:'+(open?day.color+'50':'#252528')+'">'
    +'<div class="dh" data-i="'+idx+'" style="'+(pct===100?'background:rgba(46,204,113,.08);':'')+'">'
    +'<div class="dbox" style="background:'+day.color+'18">'
    +'<span class="dlbl" style="color:'+day.color+'">'+day.label+'</span>'
    +(isToday?'<span class="tdot" style="background:'+day.color+'"></span>':'')
    +'</div>'
    +'<div class="di">'
    +'<div class="dn" style="color:'+day.color+'">'+day.name+'</div>'
    +'<div class="ds">'+day.sub+'</div>'
    +'<div class="dpb"><div class="dpf" style="width:'+pct+'%;background:'+fc+'"></div></div>'
    +'</div>'
    +'<div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">'
    +(pct===100?'<span style="font-size:18px;color:#2ecc71">&#10003;</span>':'<span class="dchev" style="'+(open?'transform:rotate(90deg)':'')+'">&#8250;</span>')
    +'<span class="dcnt" style="color:'+(pct===100?'#2ecc71':'#7a6e8a')+'">'+dc+'/'+tot+'</span>'
    +'</div>'
    +'</div>'
    +(open?'<div class="dbody">'+bodyHTML(day)+'</div>':'')
    +'</div>';
}

function absBannerHTML(ex){
  return '<div class="wbanner" style="background:linear-gradient(135deg,#f0f9ff,#e0f2fe);border-bottom:2px solid #0ea5e9">'
    +'<div class="wbico">💪</div>'
    +'<div><div class="wbtitle" style="color:#0284c7">ABDOMINAUX · OBLIGATOIRE</div>'
    +'<div class="wbsub" style="color:#0369a1">'+ex.name+' · '+ex.reps+' — '+ex.tip+'</div>'
    +'</div></div>';
}
function bodyHTML(day){
  var absExs=[],cardioExs=[],mainExs=[];
  for(var i=0;i<day.exercises.length;i++){
    var ex=day.exercises[i];
    if(ex.cat==='warmup')continue;
    else if(ex.isAbs)absExs.push(ex);
    else if(ex.cat==='cardio')cardioExs.push(ex);
    else mainExs.push(ex);
  }
  var html=absExs.map(function(ex){return absBannerHTML(ex);}).join('');
  html+=buildBlocks(mainExs).map(function(b){return blkHTML(b,day);}).join('');
  html+=cardioExs.map(function(ex){return exHTML(ex,day);}).join('');
  return html;
}

function blkHTML(block,day){
  if(block.type==='solo'){
    var ex=block.exercises[0];
    return ex.isAbdo?abdoHTML():exHTML(ex,day);
  }
  var gc=block.cat==='free'?'#ff6b35':'#3d8bff';
  return '<div class="ssblk" style="border:1.5px solid '+gc+'50">'
    +'<div class="sshdr" style="background:'+gc+'15"><span class="sslbl" style="color:'+gc+'">\u26A1 SUPER 7 \u00b7 7 reps \u00b7 M\u00EAme \u00E9quipement</span></div>'
    +block.exercises.map(function(ex,i){
      var last=i===block.exercises.length-1;
      return '<div class="sswrap"><div class="ssnum" style="background:'+gc+'">'+(i+1)+'</div>'
        +exHTML(ex,day)+'</div>'
        +(!last?'<div class="ssbetween"><span class="ssarr" style="color:'+gc+'">\u2193 SANS REPOS, PASSE AU 2\u00c8ME</span></div>':'');
    }).join('')
    +'<div class="ssftr" style="border-top:1px dashed '+gc+'30"><span style="color:'+gc+'">&#9201; Repos 60-90s apr\u00e8s les 2 exercices \u00b7 puis recommencer \u00b7 3 s\u00e9ries</span></div>'
    +'</div>';
}

function abdoHTML(){
  return '<div class="exrow"><div class="abanner">'
    +'<svg width="24" height="24" viewBox="0 0 28 28" fill="none">'
    +'<rect x="4" y="8" width="20" height="14" rx="3" fill="rgba(168,85,247,.2)" stroke="#a855f7" stroke-width="1.5"/>'
    +'<line x1="4" y1="13" x2="24" y2="13" stroke="#a855f7" stroke-width="1"/>'
    +'<line x1="14" y1="8" x2="14" y2="22" stroke="#a855f7" stroke-width="1"/>'
    +'<rect x="7" y="10" width="4" height="2.5" rx="1" fill="#a855f7"/>'
    +'<rect x="17" y="10" width="4" height="2.5" rx="1" fill="#a855f7"/>'
    +'</svg>'
    +'<span class="abtxt">AVANT LA S\u00c9ANCE \u00b7 Ab Machine \u00b7 4 \u00d7 15 reps</span>'
    +'</div></div>';
}

function exHTML(ex,day){
  var done=!!S.done[ex.id];
  var ec=exCol(ex,day.color);
  var reps=getReps(ex);
  var w=S.weights[ex.id]||'';
  var hist=S.hist[ex.id]||[];
  var last=hist.length>0?hist[hist.length-1]:null;
  var noWeight=ex.cat==='cardio'||ex.cat==='warmup'||ex.cat==='gainage'||ex.isAbs;
  var showSugg=!noWeight&&w&&w!=='\u2014'&&!ex.isAbs&&last&&last.completedCount>=3&&last.weight===w;
  var newW=w?(parseFloat(w)+2.5).toFixed(1):'';
  var catB=ex.isAbs?'<span class="bdg babs">💪 Abdos</span>'
    :ex.cat==='warmup'?'<span class="bdg bw">\uD83D\uDD25 \u00C9chauffement</span>'
    :ex.cat==='gainage'?'<span class="bdg bga">\uD83D\uDCAA Gainage</span>'
    :ex.cat==='assist'?'<span class="bdg ba">\uD83D\uDD35 Assist\u00e9e</span>'
    :ex.cat==='semi'?'<span class="bdg bs">\uD83D\uDFE1 Semi-guid\u00e9e</span>'
    :ex.cat==='free'?'<span class="bdg bf">\uD83D\uDD34 Libre</span>'
    :ex.cat==='cardio'?'<span class="bdg bc">\uD83C\uDFC3 Cardio</span>':'';
  var isoB=ex.isIso?'<span class="bdg bi">\uD83C\uDFAF Isolation</span>':'';
  var doneB=done?'<span class="bdg bd">\u2713 Fait</span>':'';
  var opts=['\u2014','2.5','5','7.5','10','12.5','15','17.5','20','22.5','25','27.5','30','32.5','35','40','45','50','55','60','70','80','90','100','120'];
  var selOpts=opts.map(function(o){return '<option value="'+o+'"'+(o===(w||'\u2014')?' selected':'')+'>'+(o==='\u2014'?'S\u00e9lectionner kg':o+' kg')+'</option>';}).join('');
  var wRow=!noWeight
    ?'<div class="wrow">'
      +'<span style="font-size:11px;color:#8a7a9a">&#9878;</span>'
      +'<select class="wsel" data-id="'+ex.id+'" style="color:'+(w&&w!=='\u2014'?ec:'#8a7a9a')+';border-color:'+(w&&w!=='\u2014'?ec+'60':'#2a2a30')+'">'+selOpts+'</select>'
      +(w&&w!=='\u2014'?'<span class="wval" style="color:'+ec+';background:'+ec+'18;border-color:'+ec+'40">'+w+' kg</span>':'')
      +'</div>'
      +(showSugg?'<div class="sugg">&#128200; Tu tiens '+w+'kg depuis 3 fois &mdash; essaie <strong>'+newW+' kg</strong></div>':'')
    :'';
  return '<div class="exrow">'
    +'<div class="extap" data-id="'+ex.id+'" style="background:'+(done?'rgba(46,204,113,.06)':'transparent')+'">'
    +'<div class="exicon" style="background:'+(done?'rgba(46,204,113,.1)':'#111113')+';border-color:'+(done?'rgba(46,204,113,.3)':'#252528')+'">'+mkIcon(ex.icon,done?'#2ecc71':ec,52)+'</div>'
    +'<div class="excnt">'
    +'<div class="exnm" style="color:'+(done?'#2ecc71':'#1a0a2e')+'">'+ex.name+'</div>'
    +'<div class="exst"><strong style="color:'+(done?'#2ecc71':'#c0c0c0')+'">'+reps+'</strong></div>'
    +'<div class="extip">'+ex.tip+'</div>'
    +'<div class="exbadges">'+catB+isoB+doneB+'</div>'
    +'</div>'
    +'<div class="exck" style="background:'+(done?'#2ecc71':'transparent')+';border-color:'+(done?'#2ecc71':'#e0d0f0')+';color:'+(done?'#fff':'transparent')+'">&#10003;</div>'
    +'</div>'+wRow+'</div>';
}


setInterval(function(){
  var nwk=getWK();
  if(ld('myr_k',null)!==nwk){S.done={};sv('myr_k',nwk);render();}
},300000);

window.addEventListener('DOMContentLoaded',function(){render();});
</script>
</body>
</html>
